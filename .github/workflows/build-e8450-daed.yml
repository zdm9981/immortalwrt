name: Build E8450 daed firmware

on:
  workflow_dispatch:
  push:
    branches:
      - "e8450-daed/**"

permissions:
  contents: read

concurrency:
  group: e8450-daed-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build firmware
    runs-on: ubuntu-24.04
    timeout-minutes: 720

    env:
      TZ: Asia/Shanghai

    steps:
      - name: Checkout ImmortalWrt release branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          docker system prune -af || true
          df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
            bzip2 ccache clang cmake curl device-tree-compiler fastjar flex gawk gettext \
            gcc-multilib g++-multilib git gperf haveged help2man intltool libc6-dev-i386 \
            libelf-dev libfuse-dev libglib2.0-dev libgmp3-dev libltdl-dev libmpc-dev \
            libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev libreadline-dev \
            libssl-dev libtool lrzsz mkisofs msmtp ninja-build p7zip p7zip-full patch \
            pkgconf python3 python3-pip python3-ply python3-docutils qemu-utils re2c \
            rsync scons squashfs-tools subversion swig texinfo uglifyjs upx-ucl unzip \
            vim wget xmlto xxd zlib1g-dev llvm npm
          sudo npm install -g pnpm

      - name: Cache downloads
        uses: actions/cache@v4
        with:
          path: dl
          key: dl-${{ github.sha }}-${{ hashFiles('custom/e8450-daed.diffconfig', 'feeds.conf.default') }}
          restore-keys: |
            dl-

      - name: Update feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply E8450 daed config
        run: |
          cp custom/e8450-daed.diffconfig .config
          make defconfig
          grep -E 'CONFIG_TARGET_mediatek|CONFIG_PACKAGE_luci-app-daed|CONFIG_KERNEL_DEBUG_INFO_BTF|CONFIG_KERNEL_CGROUP_BPF|CONFIG_KERNEL_BPF_EVENTS|CONFIG_KERNEL_XDP_SOCKETS' .config
          grep -q '^CONFIG_PACKAGE_luci-app-daed=y' .config
          grep -q '^CONFIG_PACKAGE_daed=y' .config

      - name: Download sources
        run: |
          make download -j"$(nproc)" || make download -j1 V=s

      - name: Build firmware
        run: |
          make -j"$(nproc)" || make -j1 V=s

      - name: Collect artifacts
        if: always()
        run: |
          mkdir -p artifact
          cp .config artifact/config.full || true
          cp custom/e8450-daed.diffconfig artifact/
          find bin/targets/mediatek/mt7622 -maxdepth 1 -type f \( \
            -name '*e8450*' -o \
            -name '*rt3200*' -o \
            -name '*.manifest' -o \
            -name '*.buildinfo' -o \
            -name '*.json' -o \
            -name 'sha256sums' \
          \) -exec cp -v {} artifact/ \; || true
          find bin/targets/mediatek/mt7622/packages -type f \( \
            -name '*daed*' -o \
            -name '*xdp*' -o \
            -name '*btf*' \
          \) -exec cp -v {} artifact/ \; || true
          ls -lh artifact

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: immortalwrt-e8450-daed-${{ github.run_id }}
          path: artifact/
          if-no-files-found: error
          retention-days: 14
